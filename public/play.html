<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chơi với máy — Đánh Cờ Tướng Online</title>
    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/board.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="container nav-inner">
        <a class="brand" href="index.html">
          <span class="logo">將</span>
          <span>Cờ Tướng Online</span>
        </a>
        <button class="nav-toggle" aria-label="Menu">☰</button>
        <ul class="nav-menu">
          <li><a href="index.html">Trang chủ</a></li>
          <li><a href="play.html">Chơi với máy</a></li>
          <li><a href="rooms.html">Danh sách phòng</a></li>
          <li><a href="play-online.html">Chơi với người</a></li>
          <li><a href="leaderboard.html">Xếp hạng</a></li>
          <li><a href="profile.html" data-auth="user" style="display: none">Hồ sơ</a></li>
        </ul>
        <div class="nav-actions">
          <a class="btn btn-ghost" href="login.html" data-auth="guest">Đăng nhập</a>
          <a class="btn btn-primary" href="register.html" data-auth="guest">Đăng ký</a>
          <span data-auth="user" style="display: none; font-weight: 700"
            ><span data-user-name>bạn</span></span
          >
          <a class="btn btn-ghost" href="#" data-auth="user" data-action="logout" style="display: none"
            >Đăng xuất</a
          >
        </div>
      </div>
    </header>

    <main class="container">
      <div class="play-layout">
        <!-- Cột bàn cờ -->
        <div class="board-col">
          <div class="player-bar" id="bar-black">
            <div class="who"><span class="dot black"></span> Máy (Đen) — <span id="ai-level">AI</span></div>
            <div class="captured" id="captured-black"></div>
            <div class="clock" id="timer-black">10:00</div>
          </div>

          <div id="board"></div>

          <div class="player-bar active" id="bar-red">
            <div class="who"><span class="dot red"></span> Bạn (Đỏ)</div>
            <div class="captured" id="captured-red"></div>
            <div class="clock" id="timer-red">10:00</div>
          </div>
        </div>

        <!-- Bảng điều khiển -->
        <aside class="side-panel">
          <div class="panel">
            <h3>Trạng thái</h3>
            <div id="status-msg">Chọn mức độ để bắt đầu</div>
          </div>

          <div class="panel">
            <h3>Điều khiển</h3>
            <div class="controls">
              <button class="btn btn-ghost" id="btn-undo">↶ Hoàn nước</button>
              <button class="btn btn-ghost" id="btn-resign">🏳 Xin thua</button>
              <button class="btn btn-primary" id="btn-new">＋ Ván mới</button>
            </div>
          </div>

          <div class="panel">
            <h3>Lịch sử nước đi</h3>
            <div id="move-list"></div>
          </div>
        </aside>
      </div>
    </main>

    <!-- Overlay thiết lập ván -->
    <div class="overlay" id="setup-overlay">
      <div class="modal">
        <button class="modal-close" id="btn-close-setup" aria-label="Đóng" title="Đóng">×</button>
        <h2>♟ Thiết lập ván đấu</h2>
        <div class="opt-group">
          <label>Độ khó của máy</label>
          <div class="opt-row">
            <input type="radio" name="difficulty" id="d-easy" value="easy" />
            <label for="d-easy">Dễ</label>
            <input type="radio" name="difficulty" id="d-med" value="medium" checked />
            <label for="d-med">Trung bình</label>
            <input type="radio" name="difficulty" id="d-hard" value="hard" />
            <label for="d-hard">Khó</label>
          </div>
        </div>
        <div class="opt-group">
          <label>Thời gian mỗi bên</label>
          <div class="opt-row">
            <input type="radio" name="time" id="t-5" value="5" />
            <label for="t-5">5 phút</label>
            <input type="radio" name="time" id="t-10" value="10" checked />
            <label for="t-10">10 phút</label>
            <input type="radio" name="time" id="t-15" value="15" />
            <label for="t-15">15 phút</label>
          </div>
        </div>
        <button class="btn btn-primary btn-block btn-lg" id="btn-start">Bắt đầu</button>
      </div>
    </div>

    <!-- Modal kết quả -->
    <div class="overlay hidden" id="result-modal">
      <div class="modal center">
        <h2 id="result-title">Kết thúc</h2>
        <p class="text-muted" id="result-reason"></p>
        <div class="controls" style="margin-top: 18px">
          <button class="btn btn-ghost" id="btn-again">Chơi lại</button>
          <a class="btn btn-primary" href="index.html">Về trang chủ</a>
        </div>
      </div>
    </div>

    <script src="js/engine/xiangqi.js"></script>
    <script src="js/board.js"></script>
    <script src="js/api.js"></script>
    <script src="js/play.js"></script>
    <script src="js/ui.js"></script>
    <script>
      // hiển thị nhãn độ khó trên thanh người chơi
      (function () {
        const map = { easy: 'Dễ', medium: 'Trung bình', hard: 'Khó' };
        document.querySelectorAll('input[name="difficulty"]').forEach((r) =>
          r.addEventListener('change', () => {
            document.getElementById('ai-level').textContent = map[r.value] || 'AI';
          })
        );
      })();
    </script>
  </body>
</html>
