<!DOCTYPE html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Đăng nhập — Đánh Cờ Tướng Online</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="navbar">
      <div class="container nav-inner">
        <a class="brand" href="index.html"><span class="logo">將</span><span>Cờ Tướng Online</span></a>
        <button class="nav-toggle" aria-label="Menu">☰</button>
        <ul class="nav-menu">
          <li><a href="index.html">Trang chủ</a></li>
          <li><a href="play.html">Chơi với máy</a></li>
        </ul>
        <div class="nav-actions">
          <a class="btn btn-primary" href="register.html">Đăng ký</a>
        </div>
      </div>
    </header>

    <main class="container">
      <div class="auth-wrap card">
        <h1>Đăng nhập</h1>
        <p class="center text-muted" style="margin-top: 0">Chào mừng trở lại bàn cờ!</p>
        <form id="login-form">
          <div class="form-msg" id="msg"></div>
          <div class="form-group">
            <label for="username">Tên đăng nhập</label>
            <input class="input" type="text" id="username" required autocomplete="username" />
          </div>
          <div class="form-group">
            <label for="password">Mật khẩu</label>
            <input class="input" type="password" id="password" required autocomplete="current-password" />
          </div>
          <button class="btn btn-primary btn-block btn-lg" type="submit">Đăng nhập</button>
        </form>
        <div class="form-foot">Chưa có tài khoản? <a href="register.html">Đăng ký ngay</a></div>
      </div>
    </main>

    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script>
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const msg = document.getElementById('msg');
        msg.className = 'form-msg';
        msg.textContent = '';
        try {
          await window.API.login(
            document.getElementById('username').value.trim(),
            document.getElementById('password').value
          );
          location.href = 'profile.html';
        } catch (err) {
          msg.className = 'form-msg error';
          msg.textContent = err.message || 'Đăng nhập thất bại';
        }
      });
    </script>
  </body>
</html>
