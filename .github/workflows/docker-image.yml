# Tự build Docker image của app rồi đẩy lên GitHub Container Registry (ghcr.io).
# Sau khi chạy xong, image ở: ghcr.io/phongdt29/danhcotuong.online:latest
name: Build & push Docker image

on:
  push:
    branches: [dev]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
